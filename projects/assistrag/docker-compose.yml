services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: assistrag-backend
    ports:
      - "8005:5000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/api/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: assistrag-frontend
    ports:
      - "3005:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
