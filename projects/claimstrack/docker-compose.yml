services:
  app:
    build: ./api
    volumes: [./api:/var/www/html]
    depends_on: [mysql]
    environment:
      DB_HOST: mysql
      DB_DATABASE: claimstrack
      DB_USERNAME: claims
      DB_PASSWORD: secret

  nginx:
    image: nginx:alpine
    ports: ["8081:80"]
    volumes:
      - ./api:/var/www/html
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on: [app]

  mysql:
    image: mysql:8
    environment:
      MYSQL_DATABASE: claimstrack
      MYSQL_USER: claims
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    ports: ["3307:3306"]

  nextjs:
    build: ./frontend
    ports: ["3001:3000"]
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8081/api
